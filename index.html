<div class="card">
<h2>Total Trades</h2>
<p id="trades">Loading...</p>
</div>

<div class="card">
<h2>Win Rate</h2>
<p id="winrate">Loading...</p>
</div>

<div class="card">
<h2>Total Profit</h2>
<p id="profit">Loading...</p>
</div>

<div class="card">
<h2>Best RR</h2>
<p id="rr">1:8</p>
</div>

<script>

fetch("trading-stats.csv")
.then(response => response.text())
.then(data => {

const rows = data.split("\n");
const stats = rows[1].split(",");

document.getElementById("trades").innerText = stats[0];
document.getElementById("winrate").innerText = stats[1] + "%";
document.getElementById("profit").innerText = stats[2];

});

</script>
